name: build-windows-exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: >
          pyinstaller --onefile --windowed
          --name "사이트진단도구"
          --collect-all selenium
          --collect-all trio
          --collect-all trio_websocket
          --collect-all outcome
          --collect-all wsproto
          --collect-all sortedcontainers
          diagnose.py

      - name: Smoke test (run the real exe on Windows)
        shell: pwsh
        env:
          DIAG_AUTO: "1"
          DIAG_HEADLESS: "1"
          DIAG_SITES: "foxalba,queenalba"
          DIAG_MAX_PAGES: "2"
          DIAG_MAX_DETAIL: "2"
        run: |
          Write-Host "Chrome:"; (Get-Item "C:\Program Files\Google\Chrome\Application\chrome.exe").VersionInfo.ProductVersion
          # windowed(GUI) exe — DIAG_AUTO 로 GUI 없이 헤드리스 일괄 경로 실행. 종료까지 대기.
          $p = Start-Process -FilePath ".\dist\사이트진단도구.exe" -PassThru
          $p | Wait-Process -Timeout 600
          $zip = Join-Path $env:USERPROFILE "Desktop\진단폴더 이거 보내주세요.zip"
          if (-not (Test-Path $zip)) { Write-Error "exe ran but produced NO zip — runtime failed"; exit 1 }
          Write-Host "OK: produced $zip"
          New-Item -ItemType Directory -Force -Path verification_out | Out-Null
          Copy-Item $zip verification_out\
          Expand-Archive -Path $zip -DestinationPath verification_out\unzipped -Force
          Get-ChildItem -Recurse verification_out\unzipped | Select-Object FullName,Length | Format-Table -AutoSize
          # surface captured screenshots + structure report at top level for easy review
          Get-ChildItem -Recurse verification_out\unzipped -Include *.png,structure_report.txt | ForEach-Object {
            Copy-Item $_.FullName (Join-Path "verification_out" ($_.Directory.Name + "_" + $_.Name)) -Force
          }
          Compress-Archive -Path verification_out\* -DestinationPath windows-runtime-verification.zip -Force

      - name: GUI construct test (tkinter bundled in frozen exe)
        shell: pwsh
        env:
          DIAG_GUITEST: "1"
          DIAG_GUITEST_MS: "1500"
        run: |
          $p = Start-Process -FilePath ".\dist\사이트진단도구.exe" -PassThru
          $p | Wait-Process -Timeout 60
          if ($p.ExitCode -ne 0) { Write-Error "GUI exe built window but exited $($p.ExitCode)"; exit 1 }
          Write-Host "GUI construct OK (tkinter window created and closed cleanly)"

      - name: Publish exe + verification to Release
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=(dist/*.exe)
          [ -f windows-runtime-verification.zip ] && files+=(windows-runtime-verification.zip)
          gh release create latest "${files[@]}" \
            --title "site diagnostic exe (latest)" \
            --notes "Auto-built Windows exe + Windows runtime verification (smoke test on windows-latest)." \
          || gh release upload latest "${files[@]}" --clobber
